<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | BuildCon Client Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/client.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="../index.html" class="logo" style="justify-content:center;">
          <i class="fas fa-hard-hat"></i> BUILD<span>CON</span>
        </a>
        <h2>Reset Secure Access</h2>
        <p>Provide your email address to receive password reset tokens.</p>
      </div>
      <form action="login.html" class="validate-form">
        <div class="form-group">
          <label class="form-label" for="reset-email">Email Address</label>
          <input type="email" id="reset-email" class="form-input" placeholder="client@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-full">Send Recovery Email</button>
      </form>
      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="login.html" style="font-size:0.85rem; color:var(--text-secondary); font-weight:600;"><i class="fas fa-chevron-left"></i> Back to Login</a>
      </div>
    </div>
  </div>
</body>
</html>
