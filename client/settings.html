<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Preferences | BuildCon Client Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/client.css">
</head>
<body>
  <div id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-logo">BUILD<span>CON</span></div>
  </div>

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
      <div class="sidebar-header">
        <a href="../index.html" class="logo" style="color: var(--white); font-size: 1.15rem;">
          <i class="fas fa-hard-hat text-primary"></i> BUILD<span>CON</span>
        </a>
      </div>
      <div class="sidebar-menu">
        <a href="../client/dashboard.html" class="sidebar-link "><i class="fas fa-th-large"></i> Dashboard</a>
<a href="../client/progress.html" class="sidebar-link "><i class="fas fa-tasks"></i> Project Progress</a>
<a href="../client/milestones.html" class="sidebar-link "><i class="fas fa-map-signs"></i> Milestones</a>
<a href="../client/payments.html" class="sidebar-link "><i class="fas fa-credit-card"></i> Payments</a>
<a href="../client/invoices.html" class="sidebar-link "><i class="fas fa-file-invoice-dollar"></i> Invoices</a>
<a href="../client/drawings.html" class="sidebar-link "><i class="fas fa-drafting-compass"></i> Drawings & CADs</a>
<a href="../client/documents.html" class="sidebar-link "><i class="fas fa-file-pdf"></i> Documents</a>
<a href="../client/photos.html" class="sidebar-link "><i class="fas fa-images"></i> Site Photos</a>
<a href="../client/timeline.html" class="sidebar-link "><i class="fas fa-history"></i> Project Timeline</a>
<a href="../client/messages.html" class="sidebar-link "><i class="fas fa-comments"></i> Messages</a>
<a href="../client/notifications.html" class="sidebar-link "><i class="fas fa-bell"></i> Notifications</a>
<a href="../client/profile.html" class="sidebar-link "><i class="fas fa-user-cog"></i> My Profile</a>
<a href="../client/settings.html" class="sidebar-link active"><i class="fas fa-sliders-h"></i> Settings</a>
<a href="../client/support.html" class="sidebar-link "><i class="fas fa-headset"></i> Support Helpdesk</a>
      </div>
      <div class="sidebar-footer">
        <a href="../index.html" class="sidebar-link"><i class="fas fa-sign-out-alt"></i> Exit Portal</a>
      </div>
    </aside>

    <!-- Main Dashboard Area -->
    <main class="dashboard-main">
      <nav class="dashboard-nav">
        <div class="dashboard-title">
          <h1>Preferences & Portal Configuration</h1>
        </div>
        <div class="dashboard-user">
          <div class="theme-toggle" id="theme-toggle" style="cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background-color: var(--bg-tertiary);">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun" style="display:none;"></i>
          </div>
          <div class="user-avatar">JD</div>
          <div>
            <span style="font-weight:600; display:block; font-size:0.9rem;">John Doe</span>
            <span style="font-size:0.75rem; color:var(--text-secondary);">Premium Account</span>
          </div>
        </div>
      </nav>

      <div class="dashboard-body">
        
  <div class="glass-panel" style="max-width: 600px;">
    <h3>Portal Communication Settings</h3>
    <form class="validate-form" style="margin-top:1.5rem;">
      <div class="form-group" style="display:flex; gap:1rem; align-items:center;">
        <input type="checkbox" id="sett-email" checked style="width:20px; height:20px;">
        <label for="sett-email">Receive email notifications on invoice clearances</label>
      </div>
      <div class="form-group" style="display:flex; gap:1rem; align-items:center;">
        <input type="checkbox" id="sett-sms" checked style="width:20px; height:20px;">
        <label for="sett-sms">Send mobile alerts when new site photos are uploaded</label>
      </div>
      <button type="submit" class="btn btn-primary">Save Settings</button>
    </form>
  </div>

      </div>
    </main>
  </div>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/client.js"></script>
</body>
</html>
