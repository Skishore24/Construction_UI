<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login | BuildCon Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/client.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="../index.html" class="logo" style="justify-content:center;">
          <i class="fas fa-hard-hat"></i> BUILD<span>CON</span>
        </a>
        <h2>Client Secure Portal</h2>
        <p>Enter your credentials to track construction milestones, payment records, and supervisor logs.</p>
      </div>
      <form action="dashboard.html" method="GET" class="validate-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Client Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="client@example.com" required value="client@buildcon.premium">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Password</label>
          <input type="password" id="login-pass" class="form-input" placeholder="••••••••" required value="client123">
        </div>
        <div style="text-align: right; margin-bottom: 1.5rem;">
          <a href="forgot-password.html" style="font-size:0.85rem; color:var(--primary); font-weight:600;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-full">Access Client Portal</button>
      </form>
    </div>
  </div>
</body>
</html>
